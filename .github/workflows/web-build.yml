name: Flutter Web Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Dependencies
        run: flutter pub get
      - name: Build web
        run: flutter build web --release --dart-define=APP_ENV=development
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: nizom-global-web
          path: build/web
