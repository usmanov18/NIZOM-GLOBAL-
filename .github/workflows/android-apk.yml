name: Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        type: choice
        required: true
        default: debug
        options:
          - debug
          - release
  push:
    branches:
      - main

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
      APP_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore Firebase config if provided
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Restore release keystore if provided
        if: ${{ github.event.inputs.build_type == 'release' && secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo '${{ secrets.ANDROID_KEYSTORE_BASE64 }}' | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<KEYEOF
          storeFile=app/upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYEOF

      - name: Dependencies
        run: flutter pub get

      - name: Static checks
        run: |
          python3 tools/static_check.py
          python3 tools/targeted_regression_check.py
          python3 tools/check_version.py

      - name: Analyze lib
        run: flutter analyze lib --no-fatal-infos --no-fatal-warnings

      - name: Tests
        run: flutter test

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: flutter build apk --debug --dart-define=APP_ENV=development --dart-define=GOOGLE_MAPS_KEY="$GOOGLE_MAPS_KEY"

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: flutter build apk --release --dart-define=APP_ENV=$APP_ENV --dart-define=GOOGLE_MAPS_KEY="$GOOGLE_MAPS_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nizom-global-apk
          path: build/app/outputs/flutter-apk/*.apk
