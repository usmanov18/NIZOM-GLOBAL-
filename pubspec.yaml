name: nizom_global
description: NIZOM GLOBAL - Distribution kompaniya uchun mobil ilova (1C va SAP integratsiya)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  crypto: ^3.0.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Network
  dio: ^5.3.3
  connectivity_plus: ^5.0.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # Navigation
  go_router: ^12.1.1
  
  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  
  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  
  # Notifications
  flutter_local_notifications: ^16.1.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.4
  
  # Biometric Auth
  local_auth: ^2.1.7
  
  # Image & Media
  image_picker: ^1.0.5
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Barcode Scanner
  mobile_scanner: ^3.5.5
  
  # Charts
  fl_chart: ^0.65.0
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.2.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  web_socket_channel: ^2.4.0
  permission_handler: ^11.1.0
  
  # Dependency Injection
  get_it: ^7.6.4

dev_dependencies:
  crypto: ^3.0.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
